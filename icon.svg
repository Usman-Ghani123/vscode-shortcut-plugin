<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Shortcut Finder">
  <title>Shortcut Finder</title>
  <desc>An amber path traces a route from a starting point to a destination inside a rounded square, representing keyboard shortcut discovery.</desc>
  <rect fill="#18181b" x="0" y="0" width="128" height="128" rx="26"/>
  <circle cx="31" cy="31" r="9" fill="#fbbf24"/>
  <circle cx="31" cy="31" r="3.6" fill="#18181b"/>
  <path d="M 31 31 C 31 64, 64 64, 64 97" fill="none" stroke="#fbbf24" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="2 9"/>
  <path d="M 64 97 L 97 97" fill="none" stroke="#fbbf24" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="2 9"/>
  <circle cx="97" cy="97" r="11" fill="#fbbf24"/>
  <circle cx="97" cy="97" r="4.6" fill="#18181b"/>
</svg>
